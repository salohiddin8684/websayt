<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AnimeFlix — Streaming & Tracking</title>
    <meta name="description" content="Browse top anime, search titles, and save favorites using the Jikan API." />
    <meta property="og:title" content="AnimeFlix — Streaming & Tracking" />
    <meta property="og:description" content="Browse top anime, search titles, and save favorites using the Jikan API." />
    <meta property="og:image" content="/favicon.svg" />
    <meta property="og:url" content="https://animeflix.com" />
    <link rel="icon" href="favicon.svg" type="image/svg+xml" />
    <link rel="icon" href="favicon.ico" sizes="32x32" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="stylesheet" href="login.css" />
    <link rel="stylesheet" href="css/profile.css" />
    <link rel="stylesheet" href="css/filter.css" />
  </head>
  <body data-theme="dark">
    <div class="bg-glow" aria-hidden="true"></div>
    <div class="toasts" id="toasts" aria-live="polite" aria-relevant="additions"></div>

    <!-- DETAILS VIEW -->
      <section class="animeDetailPage" id="viewDetails" data-view="details" hidden>
        <div class="detailHero" id="detailHero">
          <div class="detailHero__cover" id="detailsCover" aria-hidden="true"></div>
          <div class="container detailHero__inner">
            <button class="btn btn--ghost details__back" id="detailsBackBtn" type="button">← Back</button>
            <div class="detailHero__layout">
              <div class="detailHero__poster">
                <img id="detailsImage" alt="Anime poster" loading="eager" decoding="async" />
              </div>
              <div class="detailHero__content">
                <h1 class="details__title" id="detailsTitle">Loading...</h1>
                <div class="details__meta">
                  <span class="pill" id="detailsScore">★ --</span>
                  <span class="pill pill--ghost" id="detailsEpisodes">Episodes: --</span>
                  <span class="pill pill--ghost" id="detailsStatus">Status: --</span>
                  <span class="pill pill--ghost" id="detailsStudio">Studio: --</span>
                </div>
                <div class="chips" id="detailsGenres"></div>
                <p class="details__synopsis" id="detailsSynopsis"></p>
                <div class="details__actions">
                  <button class="btn btn--secondary" id="detailsFavBtn" type="button">Add to favorites</button>
                  <a class="btn btn--ghost" id="detailsMalLink" href="#" target="_blank" rel="noreferrer">MyAnimeList</a>
                </div>
              </div>
            </div>
          </div>
        </div>

        <div class="container details__main">
          <section class="detailWatch" aria-label="Anime video player">
            <div class="detailWatch__head">
              <h2 class="section__title">Video Player</h2>
              <span class="muted" id="episodeNow">Hozir ijro etilmoqda: Epizod 1</span>
            </div>
            <div id="detailVideoHost"></div>
            <div class="episodeRail" id="episodeList" aria-label="Episodes"></div>
          </section>

          <section class="details__similar" aria-label="Similar anime">
            <div class="section__head">
              <h2 class="section__title">O'xshash animelar</h2>
              <span class="muted" id="recsMeta"></span>
            </div>
            <div class="grid grid--tight" id="recsGrid"></div>
          </section>
        </div>
      </section>

      <!-- FAVORITES VIEW -->
      <section class="section container" id="viewFavorites" data-view="favorites" hidden>
        <div class="section__head">
          <h2 class="section__title">Your Favorites</h2>
          <div class="section__actions">
            <button class="btn btn--ghost" id="clearFavoritesBtn" type="button">Clear favorites</button>
          </div>
        </div>
        <div class="grid" id="favoritesGrid"></div>
        <div class="empty" id="favoritesEmptyPage" hidden>
          <div class="empty__title">No favorites yet</div>
          <div class="empty__text">Browse an anime and tap the heart to save it here.</div>
        </div>
      </section>

      <!-- PROFILE VIEW -->
      <section class="profilePage" id="viewProfile" data-view="profile" hidden>
        <div id="profilePageRoot"></div>
      </section>

      <!-- FILTER VIEW -->
      <section class="filterPage section" id="viewFilter" data-view="filter" hidden>
        <div class="container filterPage__inner">
          <div id="filterRoot"></div>
        </div>
      </section>
    </main>

    <footer class="footer">
      <div class="container footer__inner">
        <div class="muted">
          Data via Jikan API (unofficial MyAnimeList API). Built with HTML/CSS/JS.
        </div>
      </div>
    </footer>

    <script src="js/config.js" defer></script>
    <script src="js/router.js" defer></script>
    <script src="js/core.js" defer></script>
    <script src="js/api.js" defer></script>
    <script src="js/storage.js" defer></script>
    <script src="js/components/profile/avatarData.js" defer></script>
    <script src="js/components/profile/AvatarSelector.js" defer></script>
    <script src="js/components/profile/NavbarProfile.js" defer></script>
    <script src="js/components/profile/ProfileDropdown.js" defer></script>
    <script src="js/components/profile/ProfilePage.js" defer></script>
    <script src="js/auth.js" defer></script>
    <script src="js/render.js" defer></script>
    <script src="js/player.js" defer></script>
    <script src="js/detail.js" defer></script>
    <script src="js/filter.js" defer></script>
    <script src="js/app.js" defer></script>
    <script defer>
      // boot
      window.addEventListener("load", () => {
        if (window.AnimeFlix && typeof window.AnimeFlix.init === 'function') {
          window.AnimeFlix.init();
        } else {
          console.error("AnimeFlix core failed to load.");
        }
      });
    </script>
  </body>
</html>
